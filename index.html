<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Single Page Apps for GitHub Pages</title>
    <script type="text/javascript">
      // For root custom domain (moearn.com) → keep 0
      // If deployed as https://yourusername.github.io/your-repo/ → change to 1
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + (l.hostname || l.host) + (l.port ? ':' + l.port : '') +
        '/' + (pathSegmentsToKeep ? l.pathname.split('/').slice(1, pathSegmentsToKeep + 1).join('/') + '/' : '') +
        '?/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
        l.search + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
